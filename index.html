<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia — Tracker 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #f5f5f8;
    --surface2: #eaeaf0;
    --border: #dddde8;
    --border-active: #aaaacc;
    --text: #1a1a2e;
    --text-muted: #7777aa;
    --accent: #5c4ff0;
    --aer: #d94040;
    --alo: #1fa870;
    --mi: #2080d0;
    --ms: #c97f10;
    --today: #c97f10;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 12px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 22px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #1a1a2e;
  }
  header p {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 18px;
  }
  .nav button {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border-active);
    background: var(--surface);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav button:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); }
  .nav button:disabled { opacity: 0.25; cursor: default; }
  .month-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #1a1a2e;
    min-width: 190px;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* Stats */
  .stats {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
  }
  .stat-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-pill strong {
    color: #1a1a2e;
    font-size: 0.95rem;
    font-weight: 700;
    margin-left: 2px;
  }

  /* Calendar grid */
  .weekdays, .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    max-width: 900px;
    margin: 0 auto;
  }
  .weekday {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text-muted);
    padding: 4px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }

  .day {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 7px 6px 8px;
    min-height: 110px;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .day.empty { background: transparent; border-color: transparent; pointer-events: none; }
  .day.has-any { border-color: var(--border-active); background: #efeffa; }
  .day.is-today { border-color: var(--today); }
  .day.is-today::after {
    content: '';
    position: absolute;
    top: 7px; right: 7px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--today);
  }

  .day-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: #888;
    margin-bottom: 7px;
  }
  .day.is-today .day-num { color: var(--today); }

  .checks {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.6rem;
    color: #666;
    cursor: pointer;
    border-radius: 5px;
    padding: 2px 3px;
    transition: background 0.1s, color 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .check-row:hover { background: var(--surface2); color: #aaa; }
  .check-row.on { color: #ddd; }

  .tick {
    width: 13px; height: 13px;
    border-radius: 3px;
    border: 1.5px solid #3a3a50;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
    position: relative;
  }
  .tick svg { display: none; }
  .check-row.on .tick svg { display: block; }

  .check-row[data-act="aer"] .tick { border-color: var(--aer); }
  .check-row[data-act="aer"].on .tick { background: var(--aer); border-color: var(--aer); }

  .check-row[data-act="alo"] .tick { border-color: var(--alo); }
  .check-row[data-act="alo"].on .tick { background: var(--alo); border-color: var(--alo); }

  .check-row[data-act="mi"] .tick { border-color: var(--mi); }
  .check-row[data-act="mi"].on .tick { background: var(--mi); border-color: var(--mi); }

  .check-row[data-act="ms"] .tick { border-color: var(--ms); }
  .check-row[data-act="ms"].on .tick { background: var(--ms); border-color: var(--ms); }

  /* Backup bar */
  .backup-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .btn-backup {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--border-active);
    background: var(--surface);
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-backup:hover { background: var(--surface2); border-color: var(--accent); }
  .btn-backup.export { border-color: var(--alo); color: var(--alo); }
  .btn-backup.export:hover { background: #e8f8f2; }
  .btn-backup.import { border-color: var(--mi); color: var(--mi); }
  .btn-backup.import:hover { background: #e8f2fb; }
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a1a2e;
    color: #fff;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media print { .backup-bar { display: none; } }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 18px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .legend-swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  @media print {
    body { padding: 8px; }
    .nav button { display: none; }
    .day { break-inside: avoid; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  @media (max-width: 500px) {
    .day { min-height: 90px; padding: 5px 4px; }
    .check-row { font-size: 0.55rem; gap: 3px; }
    .tick { width: 11px; height: 11px; }
    .stats { gap: 5px; }
    .stat-pill { font-size: 0.65rem; padding: 4px 9px; }
  }
</style>
</head>
<body>

<header>
  <h1>🏋️ Academia — Tracker 2026</h1>
  <p>Clique nas atividades de cada dia para marcar sua frequência</p>
</header>

<div class="nav">
  <button id="btn-prev" onclick="shift(-1)">&#8249;</button>
  <div class="month-title" id="month-title"></div>
  <button id="btn-next" onclick="shift(+1)">&#8250;</button>
</div>

<div class="stats">
  <div class="stat-pill"><span class="dot" style="background:var(--aer)"></span>Aeróbica <strong id="s-aer">0</strong></div>
  <div class="stat-pill"><span class="dot" style="background:var(--alo)"></span>Alongamento <strong id="s-alo">0</strong></div>
  <div class="stat-pill"><span class="dot" style="background:var(--mi)"></span>Musc. Inferior <strong id="s-mi">0</strong></div>
  <div class="stat-pill"><span class="dot" style="background:var(--ms)"></span>Musc. Superior <strong id="s-ms">0</strong></div>
  <div class="stat-pill">💪 Dias na academia <strong id="s-days">0</strong></div>
</div>

<div class="weekdays" id="weekdays">
  <div class="weekday">Dom</div>
  <div class="weekday">Seg</div>
  <div class="weekday">Ter</div>
  <div class="weekday">Qua</div>
  <div class="weekday">Qui</div>
  <div class="weekday">Sex</div>
  <div class="weekday">Sáb</div>
</div>

<div class="calendar" id="cal"></div>

<div class="backup-bar">
  <button class="btn-backup export" onclick="exportData()">💾 Exportar backup</button>
  <button class="btn-backup import" onclick="document.getElementById('file-import').click()">📂 Importar backup</button>
  <input type="file" id="file-import" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:var(--aer)"></div>Aeróbica</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--alo)"></div>Alongamento</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--mi)"></div>Musculação Inferior</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--ms)"></div>Musculação Superior</div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ACTS = [
  { id: 'aer', label: 'Aeróbica' },
  { id: 'alo', label: 'Alongamento' },
  { id: 'mi',  label: 'Musc. Inf.' },
  { id: 'ms',  label: 'Musc. Sup.' },
];
const FIRST = 6;
const LAST  = 11;

const today = new Date();
let cur = 6;

const STORE_KEY = 'academia_tracker_2026';
let data = {};

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) data = JSON.parse(raw);
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) {}
}

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// Export
function exportData() {
  const payload = { version: 1, exported: new Date().toISOString(), data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `academia_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Backup exportado com sucesso!');
}

// Import
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (parsed.data && typeof parsed.data === 'object') {
        data = parsed.data;
        save();
        render();
        showToast('✅ Backup importado com sucesso!');
      } else {
        showToast('⚠️ Arquivo inválido.');
      }
    } catch(err) {
      showToast('⚠️ Erro ao ler o arquivo.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function dk(m, d) { return `2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function getEntry(key) {
  if (!data[key]) data[key] = {};
  return data[key];
}

function toggle(key, act) {
  const e = getEntry(key);
  e[act] = !e[act];
  save();
  render();
}

function shift(dir) {
  cur = Math.min(LAST, Math.max(FIRST, cur + dir));
  render();
}

const CHECKMARK = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4.5 3.5,7 8,2"/></svg>`;

function render() {
  const m = cur;
  document.getElementById('month-title').textContent = `${MONTHS[m]} 2026`;
  document.getElementById('btn-prev').disabled = m <= FIRST;
  document.getElementById('btn-next').disabled = m >= LAST;

  const firstDow = new Date(2026, m, 1).getDay();
  const daysInMonth = new Date(2026, m + 1, 0).getDate();

  const cal = document.getElementById('cal');
  cal.innerHTML = '';

  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    cal.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = dk(m, d);
    const entry = getEntry(key);
    const hasAny = ACTS.some(a => entry[a.id]);
    const isToday = (today.getFullYear() === 2026 && today.getMonth() === m && today.getDate() === d);

    const el = document.createElement('div');
    el.className = 'day' + (hasAny ? ' has-any' : '') + (isToday ? ' is-today' : '');

    el.innerHTML = `<div class="day-num">${d}</div>
      <div class="checks">
        ${ACTS.map(a => `
          <div class="check-row${entry[a.id] ? ' on' : ''}" data-act="${a.id}" data-key="${key}">
            <div class="tick">${CHECKMARK}</div>
            <span>${a.label}</span>
          </div>`).join('')}
      </div>`;

    cal.appendChild(el);
  }

  cal.querySelectorAll('.check-row').forEach(row => {
    row.addEventListener('click', function() {
      toggle(this.dataset.key, this.dataset.act);
    });
  });

  updateStats(m);
}

function updateStats(m) {
  const daysInMonth = new Date(2026, m + 1, 0).getDate();
  const counts = { aer:0, alo:0, mi:0, ms:0, days:0 };
  for (let d = 1; d <= daysInMonth; d++) {
    const entry = getEntry(dk(m, d));
    let dayHas = false;
    ACTS.forEach(a => { if(entry[a.id]) { counts[a.id]++; dayHas = true; } });
    if (dayHas) counts.days++;
  }
  document.getElementById('s-aer').textContent  = counts.aer;
  document.getElementById('s-alo').textContent  = counts.alo;
  document.getElementById('s-mi').textContent   = counts.mi;
  document.getElementById('s-ms').textContent   = counts.ms;
  document.getElementById('s-days').textContent = counts.days;
}

load();
render();
</script>
</body>
</html>
